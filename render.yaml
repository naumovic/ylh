# Render blueprint — single Node web service that serves the built PWA (dist/)
# and the email-gate API (/api/unlock, /api/reserve). Auto-deploys from `main`.
# Task 4A. Stripe (/api/verify) will live on this same service later (4B).
services:
  - type: web
    name: ylh-web
    runtime: node
    plan: starter # do NOT use free — it spins down; the API must stay warm (Task 4A §7)
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: RESEND_API_KEY
        sync: false # set in the Render dashboard
      - key: RESEND_AUDIENCE_ID
        sync: false
      - key: RESEND_FROM
        sync: false # e.g. "Your Local Hero <plan@mail.yourlocalhero.com.au>"
      - key: VITE_POSTHOG_KEY
        sync: false # build-time (inlined into the client bundle)
      # Installer directory (Phase 2). Keep OFF in prod until the Phase-3 organic-release
      # gate passes — a flag-off build ships no directory code/data. Flip VITE_FF_DIRECTORY
      # to "on" (dashboard, then redeploy) to launch. VITE_FF_OVERRIDES=on lets you probe a
      # prod build via ?ff_directory=1 before launch; ship it OFF/unset once live.
      - key: VITE_FF_DIRECTORY
        value: "" # off
      - key: VITE_FF_OVERRIDES
        value: "" # off
